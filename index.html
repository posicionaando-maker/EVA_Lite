<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>EVA Lite - Clases TI Offline</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007bff">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { background: linear-gradient(135deg, #007bff, #0056b3); color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
    .header h1 { font-size: 1.8rem; }
    .toolbar { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
    .btn-primary { background: #28a745; color: white; }
    .btn-secondary { background: #17a2b8; color: white; }
    .btn-warning { background: #ffc107; color: #333; }
    .btn-danger { background: #dc3545; color: white; }
    .btn:disabled { background: #6c757d; cursor: not-allowed; }
    .contenidos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .tarjeta { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: transform 0.2s; }
    .tarjeta:hover { transform: translateY(-3px); }
    .tarjeta.completado { border-left: 5px solid #28a745; background: #f0fff0; }
    .badge { background: #28a745; color: white; font-size: 0.7rem; padding: 3px 8px; border-radius: 12px; display: inline-block; margin-bottom: 10px; }
    .btn-ver, .btn-cuestionario { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; margin-right: 10px; font-size: 0.85rem; }
    .btn-ver { background: #007bff; color: white; }
    .btn-cuestionario { background: #ffc107; color: #333; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: white; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; padding: 25px; border-radius: 15px; }
    .registro { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .registro input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; }
    .registro button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; font-size: 1rem; cursor: pointer; }
    .progreso-panel { background: white; padding: 15px; border-radius: 10px; margin-top: 20px; }
    .progreso-stats { display: flex; gap: 20px; flex-wrap: wrap; }
    .stat { background: #f0f0f0; padding: 10px 15px; border-radius: 8px; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #28a745; color: white; padding: 12px 20px; border-radius: 8px; animation: slideIn 0.3s ease; z-index: 2000; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .offline-indicator { position: fixed; top: 0; left: 0; right: 0; background: #ffc107; color: #333; text-align: center; padding: 5px; font-size: 0.8rem; z-index: 1500; }
    .version-info { font-size: 0.7rem; opacity: 0.8; margin-top: 5px; }
    @media (max-width: 768px) { body { padding: 10px; } .toolbar { flex-direction: column; } }
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
  // ========================================
  // 1. CONFIGURACIÓN
  // ========================================
  // URL del contenido en GitHub (cambia por la de tu repositorio)
  const CONTENIDOS_URL = 'https://raw.githubusercontent.com/TU_USUARIO/TU_REPO/main/contenidos.json';
  
  let db = null;
  let hayInternet = navigator.onLine;
  let contenidosActuales = { temas: [], version: '1.0', fecha_actualizacion: '' };
  
  let estado = {
    estudiante: null,
    contenidos: [],
    progreso: {},
    temaSeleccionado: null
  };

  // ========================================
  // 2. DETECCIÓN DE INTERNET
  // ========================================
  function mostrarIndicadorOffline() {
    let indicator = document.getElementById('offline-indicator');
    if (!indicator && !hayInternet) {
      indicator = document.createElement('div');
      indicator.id = 'offline-indicator';
      indicator.className = 'offline-indicator';
      indicator.innerHTML = '⚠️ SIN CONEXIÓN - Modo offline activo. Los contenidos son los de la última visita.';
      document.body.insertBefore(indicator, document.body.firstChild);
    } else if (indicator && hayInternet) {
      indicator.remove();
    }
  }

  window.addEventListener('online', () => {
    hayInternet = true;
    mostrarIndicadorOffline();
    mostrarToast('✅ Conexión recuperada. Buscando actualizaciones...');
    setTimeout(() => actualizarContenidos(), 1000);
  });
  
  window.addEventListener('offline', () => {
    hayInternet = false;
    mostrarIndicadorOffline();
    mostrarToast('📡 Sin conexión. Usando contenidos guardados.', 'warning');
  });

  function mostrarToast(mensaje, tipo = 'success') {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.background = tipo === 'warning' ? '#ffc107' : '#28a745';
    toast.style.color = tipo === 'warning' ? '#333' : 'white';
    toast.innerHTML = mensaje;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // ========================================
  // 3. INDEXEDDB
  // ========================================
  function abrirDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open('EvaLiteDB', 3);
      request.onerror = () => reject(request.error);
      request.onsuccess = () => {
        db = request.result;
        resolve(db);
      };
      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        if (!db.objectStoreNames.contains('estudiantes')) db.createObjectStore('estudiantes', { keyPath: 'id', autoIncrement: true });
        if (!db.objectStoreNames.contains('contenidos')) db.createObjectStore('contenidos', { keyPath: 'id' });
        if (!db.objectStoreNames.contains('progreso')) db.createObjectStore('progreso', { keyPath: 'id_contenido' });
        if (!db.objectStoreNames.contains('entregas')) db.createObjectStore('entregas', { keyPath: 'id', autoIncrement: true });
        if (!db.objectStoreNames.contains('cuestionarios')) db.createObjectStore('cuestionarios', { keyPath: 'id', autoIncrement: true });
        if (!db.objectStoreNames.contains('metadata')) db.createObjectStore('metadata', { keyPath: 'clave' });
      };
    });
  }

  async function guardarContenidosEnDB(contenidos) {
    const transaction = db.transaction(['contenidos'], 'readwrite');
    const store = transaction.objectStore('contenidos');
    store.clear();
    for (const tema of contenidos) {
      store.put({
        id: tema.id,
        titulo: tema.titulo,
        descripcion_corta: tema.descripcion_corta,
        texto_completo: tema.texto_completo,
        cuestionario: tema.cuestionario,
        ejercicio_sugerido: tema.ejercicio_sugerido
      });
    }
    const metaTransaction = db.transaction(['metadata'], 'readwrite');
    const metaStore = metaTransaction.objectStore('metadata');
    metaStore.put({ clave: 'ultima_version', valor: contenidosActuales.version });
    metaStore.put({ clave: 'ultima_actualizacion', valor: Date.now() });
  }

  async function obtenerContenidosDB() {
    const transaction = db.transaction(['contenidos'], 'readonly');
    const store = transaction.objectStore('contenidos');
    return new Promise((resolve) => {
      const request = store.getAll();
      request.onsuccess = () => resolve(request.result);
    });
  }

  async function obtenerProgresoDB() {
    const transaction = db.transaction(['progreso'], 'readonly');
    const store = transaction.objectStore('progreso');
    return new Promise((resolve) => {
      const request = store.getAll();
      request.onsuccess = () => {
        const progreso = {};
        request.result.forEach(p => { progreso[p.id_contenido] = p; });
        resolve(progreso);
      };
    });
  }

  async function guardarProgresoDB(id_contenido, completado, puntaje = null) {
    const transaction = db.transaction(['progreso'], 'readwrite');
    const store = transaction.objectStore('progreso');
    store.put({ id_contenido: id_contenido, completado: completado, puntaje: puntaje, fecha: Date.now() });
  }

  async function guardarCuestionarioDB(id_contenido, respuestas, puntaje) {
    const transaction = db.transaction(['cuestionarios'], 'readwrite');
    const store = transaction.objectStore('cuestionarios');
    store.add({ id_contenido: id_contenido, respuestas: respuestas, puntaje: puntaje, fecha: Date.now() });
    await guardarProgresoDB(id_contenido, true, puntaje);
  }

  async function guardarEntrega(archivoBase64, metadata) {
    const transaction = db.transaction(['entregas'], 'readwrite');
    const store = transaction.objectStore('entregas');
    return new Promise((resolve) => {
      const request = store.add({ archivo_base64: archivoBase64, metadata: metadata, fecha: Date.now() });
      request.onsuccess = () => resolve(request.result);
    });
  }

  async function obtenerEntregas() {
    const transaction = db.transaction(['entregas'], 'readonly');
    const store = transaction.objectStore('entregas');
    return new Promise((resolve) => {
      const request = store.getAll();
      request.onsuccess = () => resolve(request.result);
    });
  }

  async function registrarEstudiante(nombre, email) {
    const transaction = db.transaction(['estudiantes'], 'readwrite');
    const store = transaction.objectStore('estudiantes');
    const existe = await new Promise((resolve) => {
      const request = store.getAll();
      request.onsuccess = () => resolve(request.result.find(e => e.email === email));
    });
    if (!existe) store.add({ nombre: nombre, email: email, fecha_registro: Date.now() });
  }

  async function obtenerEstudiante() {
    const transaction = db.transaction(['estudiantes'], 'readonly');
    const store = transaction.objectStore('estudiantes');
    return new Promise((resolve) => {
      const request = store.getAll();
      request.onsuccess = () => resolve(request.result[0] || null);
    });
  }

  // ========================================
  // 4. ACTUALIZACIÓN DE CONTENIDOS DESDE GITHUB
  // ========================================
  async function actualizarContenidos() {
    if (!hayInternet) return;
    
    try {
      const response = await fetch(CONTENIDOS_URL + '?t=' + Date.now());
      if (response.ok) {
        const nuevos = await response.json();
        const versionActual = contenidosActuales.version || '0';
        const versionNueva = nuevos.version || '0';
        
        if (versionNueva !== versionActual) {
          contenidosActuales = nuevos;
          await guardarContenidosEnDB(nuevos.temas);
          mostrarToast(`📚 ¡Nuevos contenidos! Versión ${versionNueva}`, 'success');
          
          if (estado.estudiante) {
            await cargarDatos();
            renderizarPrincipal();
          }
        }
      }
    } catch (e) {
      console.log('Error actualizando contenidos:', e);
    }
  }

  // ========================================
  // 5. EXPORTAR E IMPORTAR DATOS
  // ========================================
  async function exportarDatos() {
    const entregas = await obtenerEntregas();
    const progreso = await obtenerProgresoDB();
    const estudiante = await obtenerEstudiante();
    
    const datosExportados = {
      version: '1.0',
      fecha_exportacion: new Date().toISOString(),
      estudiante: estudiante,
      progreso: progreso,
      entregas: entregas.map(e => ({
        metadata: e.metadata,
        fecha: e.fecha,
        archivo_base64: e.archivo_base64  // Incluye el archivo
      }))
    };
    
    const json = JSON.stringify(datosExportados, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `eva-progreso-${estudiante?.nombre || 'estudiante'}.json`;
    a.click();
    URL.revokeObjectURL(url);
    
    mostrarToast('📁 Datos exportados correctamente');
  }

  async function importarDatos(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const datos = JSON.parse(e.target.result);
          
          // Importar progreso
          if (datos.progreso) {
            for (const p of Object.values(datos.progreso)) {
              await guardarProgresoDB(p.id_contenido, p.completado, p.puntaje);
            }
          }
          
          // Importar entregas
          if (datos.entregas) {
            for (const entrega of datos.entregas) {
              await guardarEntrega(entrega.archivo_base64, entrega.metadata);
            }
          }
          
          mostrarToast('✅ Datos importados correctamente');
          resolve();
        } catch (err) {
          reject(err);
        }
      };
      reader.readAsText(file);
    });
  }

  // ========================================
  // 6. RENDERIZADO
  // ========================================
  const app = document.getElementById('app');

  function renderizarRegistro() {
    app.innerHTML = `
      <div class="registro">
        <h2>📚 EVA Lite - Clases TI</h2>
        <p style="text-align:center; color:#666;">Plataforma offline para estudiantes de TI</p>
        <p style="text-align:center; font-size:0.8rem; color:#888;">Sin internet necesario | Tus datos quedan en tu dispositivo</p>
        <input type="text" id="nombre" placeholder="Nombre completo" required>
        <input type="email" id="email" placeholder="Correo electrónico" required>
        <button id="btn-registrar">Comenzar a Estudiar</button>
      </div>
    `;
    document.getElementById('btn-registrar').addEventListener('click', async () => {
      const nombre = document.getElementById('nombre').value;
      const email = document.getElementById('email').value;
      if (nombre && email) {
        await registrarEstudiante(nombre, email);
        estado.estudiante = await obtenerEstudiante();
        await cargarDatos();
        renderizarPrincipal();
      } else {
        alert('Completa todos los campos');
      }
    });
  }

  async function cargarDatos() {
    estado.contenidos = await obtenerContenidosDB();
    estado.progreso = await obtenerProgresoDB();
  }

  function renderizarPrincipal() {
    const completados = Object.keys(estado.progreso).filter(k => estado.progreso[k]?.completado).length;
    const versionStr = contenidosActuales.version ? `v${contenidosActuales.version}` : 'local';
    
    app.innerHTML = `
      <div class="header">
        <h1>📚 EVA Lite - Clases TI</h1>
        <p>Bienvenido, ${estado.estudiante?.nombre || 'Estudiante'}</p>
        <div class="version-info">Contenidos ${versionStr} · ${contenidosActuales.fecha_actualizacion || 'modo offline'}</div>
      </div>
      
      <div class="toolbar">
        <button class="btn btn-primary" id="btn-actualizar" ${!hayInternet ? 'disabled' : ''}>
          🔄 Buscar actualizaciones
        </button>
        <button class="btn btn-secondary" id="btn-exportar">
          📤 Exportar mi progreso
        </button>
        <label class="btn btn-warning" style="display:inline-block; cursor:pointer;">
          📥 Importar progreso
          <input type="file" id="import-file" accept=".json" style="display:none;">
        </label>
        <button class="btn btn-danger" id="btn-reset" style="background:#dc3545;">
          🗑️ Resetear todo
        </button>
      </div>
      
      <div class="contenidos-grid">
        ${estado.contenidos.map(tema => `
          <div class="tarjeta ${estado.progreso[tema.id]?.completado ? 'completado' : ''}">
            <h3>${tema.titulo}</h3>
            ${estado.progreso[tema.id]?.completado ? '<span class="badge">✅ Completado</span>' : ''}
            <p>${(tema.descripcion_corta || tema.texto_completo?.substring(0, 100) || '')}...</p>
            <button class="btn-ver" data-id="${tema.id}" data-titulo="${tema.titulo.replace(/['"]/g, '&quot;')}" data-texto="${(tema.texto_completo || '').replace(/['"]/g, '&quot;')}" data-ejercicio="${(tema.ejercicio_sugerido || '').replace(/['"]/g, '&quot;')}">Ver Completo</button>
            <button class="btn-cuestionario" data-id="${tema.id}" data-titulo="${tema.titulo.replace(/['"]/g, '&quot;')}">📝 Cuestionario</button>
          </div>
        `).join('')}
      </div>
      
      <div class="progreso-panel">
        <h3>📊 Tu progreso</h3>
        <div class="progreso-stats">
          <div class="stat">📖 Completados: ${completados}/${estado.contenidos.length}</div>
          <div class="stat">📡 ${hayInternet ? '🟢 Online' : '🔴 Offline'}</div>
        </div>
        <p style="margin-top:15px; font-size:0.8rem; color:#666;">
          💡 Los ejercicios que subas quedan guardados en este dispositivo.<br>
          📁 Usa "Exportar" para enviarme tu progreso por USB/email/whatsapp.
        </p>
      </div>
    `;
    
    // Eventos
    document.querySelectorAll('.btn-ver').forEach(btn => {
      btn.addEventListener('click', () => mostrarModalTema(btn.dataset.id, btn.dataset.titulo, btn.dataset.texto, btn.dataset.ejercicio));
    });
    document.querySelectorAll('.btn-cuestionario').forEach(btn => {
      btn.addEventListener('click', () => mostrarCuestionario(btn.dataset.id, btn.dataset.titulo));
    });
    
    document.getElementById('btn-actualizar')?.addEventListener('click', async () => {
      const btn = document.getElementById('btn-actualizar');
      btn.disabled = true;
      btn.textContent = '🔄 Buscando...';
      await actualizarContenidos();
      btn.disabled = false;
      btn.textContent = '🔄 Buscar actualizaciones';
    });
    
    document.getElementById('btn-exportar')?.addEventListener('click', () => exportarDatos());
    
    const fileInput = document.getElementById('import-file');
    if (fileInput) {
      fileInput.addEventListener('change', async (e) => {
        if (e.target.files[0]) {
          await importarDatos(e.target.files[0]);
          await cargarDatos();
          renderizarPrincipal();
        }
      });
    }
    
    document.getElementById('btn-reset')?.addEventListener('click', async () => {
      if (confirm('⚠️ ¿Borrar TODO tu progreso y ejercicios? Esta acción no se puede deshacer.')) {
        // Limpiar todas las tablas
        const tables = ['progreso', 'entregas', 'cuestionarios'];
        for (const table of tables) {
          const transaction = db.transaction([table], 'readwrite');
          const store = transaction.objectStore(table);
          store.clear();
        }
        await cargarDatos();
        renderizarPrincipal();
        mostrarToast('🗑️ Todos tus datos han sido eliminados');
      }
    });
  }

  function mostrarModalTema(id, titulo, texto, ejercicio) {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    modal.innerHTML = `
      <div class="modal-content">
        <h2>${titulo}</h2>
        <p>${texto || 'Contenido no disponible'}</p>
        ${ejercicio ? `<p><strong>💡 Ejercicio sugerido:</strong> ${ejercicio}</p>` : ''}
        <h4>📎 Subir ejercicio (queda guardado en tu dispositivo)</h4>
        <input type="file" id="file-upload" accept="image/*,.pdf">
        <button id="subir-ejercicio" style="background:#28a745; color:white; border:none; padding:8px 15px; border-radius:5px; margin-top:10px;">Guardar ejercicio</button>
        <hr><button class="btn-cerrar">Cerrar</button>
      </div>
    `;
    document.body.appendChild(modal);
    modal.querySelector('.btn-cerrar').addEventListener('click', () => modal.remove());
    modal.querySelector('#subir-ejercicio').addEventListener('click', async () => {
      const file = modal.querySelector('#file-upload').files[0];
      if (!file) { alert('Selecciona un archivo'); return; }
      const reader = new FileReader();
      reader.onload = async (e) => {
        await guardarEntrega(e.target.result, { nombre: file.name, tema_id: id, tema_titulo: titulo, fecha: new Date().toISOString() });
        alert('✅ Ejercicio guardado localmente. Usa "Exportar" para enviarlo al profesor.');
        modal.remove();
      };
      reader.readAsDataURL(file);
    });
  }

  function mostrarCuestionario(id, titulo) {
    const respuestas = prompt(`📝 Cuestionario: ${titulo}\n\nResponde:\n1. ¿Cuál es la idea principal?\n2. ¿Qué aprendiste?\n3. ¿Cómo aplicarías esto?\n\nEscribe tus respuestas:`);
    if (respuestas?.trim()) {
      const puntaje = Math.floor(Math.random() * 10) + 1;
      guardarCuestionarioDB(id, respuestas, puntaje);
      alert(`✅ ¡Completado!\n📊 Puntaje: ${puntaje}/10`);
      cargarDatos();
      renderizarPrincipal();
    }
  }

  // ========================================
  // 7. INICIALIZACIÓN
  // ========================================
  async function iniciar() {
    mostrarIndicadorOffline();
    await abrirDB();
    
    // Cargar contenidos desde DB
    const contenidosDB = await obtenerContenidosDB();
    if (contenidosDB.length > 0) {
      estado.contenidos = contenidosDB;
    }
    
    // Intentar cargar versión desde metadata
    const metaTransaction = db.transaction(['metadata'], 'readonly');
    const metaStore = metaTransaction.objectStore('metadata');
    const versionRequest = metaStore.get('ultima_version');
    versionRequest.onsuccess = () => {
      if (versionRequest.result) {
        contenidosActuales.version = versionRequest.result.valor;
      }
    };
    
    const estudiante = await obtenerEstudiante();
    if (estudiante) {
      estado.estudiante = estudiante;
      await cargarDatos();
      renderizarPrincipal();
    } else {
      renderizarRegistro();
    }
    
    // Si hay internet, buscar actualizaciones
    if (hayInternet) {
      setTimeout(() => actualizarContenidos(), 2000);
    }
  }
  
  iniciar();
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('✅ Service Worker registrado'))
      .catch(err => console.log('❌ SW error:', err));
  }
</script>
</body>
</html>
